name: dev
description: Full development machine setup

core: [jq, curl, wget, tree, bat, fd, ripgrep, htop]
terminal: [oh-my-zsh, powerline, theme, fonts]
languages: [python, ruby]
ios: [swiftlint, swiftformat, cocoapods, fastlane, carthage, xcbeautify]
cloud: [docker, docker-compose, terraform, ansible, awscli, kubernetes-cli]
apps: [google-chrome, visual-studio-code, sublime-text, sourcetree, proxyman, charles, postman, cursor, sf-symbols]
comms: [slack, zoom, whatsapp, telegram]
productivity: [bitwarden, spotify, iina, betterzip, setapp, dockdoor, openaudible]
ai: [claude, chatgpt, claude-code, codex]
mas:
  - { id: 472226235, name: LanScan }
  - { id: 904280696, name: "Things 3" }
  - { id: 441258766, name: Magnet }
macos: [dock, finder, keyboard, trackpad, mouse, power, screenshots, menu-bar, hot-corners, language-region, activity-monitor, app-store, terminal, time-machine, xcode]
macos_complex: [dock-folders, photos, spotlight, bluetooth-audio, printing, keyboard-shortcuts, scroll-behavior, login-window, sourcetree, advanced-trackpad]
cleanup: [GarageBand.app, iMovie.app, Keynote.app, Numbers.app, Pages.app]
encryption: true
xcode: true

config:
  git:
    user_name: JARMourato
    user_email: joao.armourato@gmail.com
  python_versions: ["3.12"]
  ruby_version: "3.4.1"
  apps:
    casks:
      - sf-symbols
      - proxyman
      - charles
      - visual-studio-code
      - sublime-text
      - sourcetree
      - postman
      - cursor
      - google-chrome
  comms:
    casks:
      - slack
      - zoom
      - whatsapp
      - telegram
  productivity:
    casks:
      - bitwarden
      - spotify
      - iina
      - betterzip
      - openaudible
      - setapp
      - dockdoor
  ai:
    casks:
      - chatgpt
      - claude
    npm:
      - "@anthropic-ai/claude-code"
  ios:
    formulas:
      - swiftlint
      - swiftformat
      - carthage
      - cocoapods
      - fastlane
      - xcbeautify
  cloud:
    formulas:
      - docker-compose
      - kubernetes-cli
      - terraform
      - ansible
      - awscli
    casks:
      - docker
  mas:
    apps:
      - id: 472226235
        name: LanScan
      - id: 904280696
        name: Things 3
      - id: 441258766
        name: Magnet
  cleanup:
    remove:
      - GarageBand.app
      - iMovie.app
      - Keynote.app
      - Numbers.app
      - Pages.app
  terminal:
    enable_powerline: true
    theme: Highway
  macos:
    activity_monitor:
      open_main_window: true
      show_all_processes: true
      sort_by_cpu: true
    app_store:
      check_updates_daily: true
    dock:
      autohide: false
      tile_size: 40
      large_size: 64
      magnification: true
      minimize_to_application: true
      show_process_indicators: true
      orientation: bottom
      disable_recent_apps: true
      disable_rearrange_spaces: true
    finder:
      new_window_target: home
      show_external_drives: true
      show_hard_drives: true
      show_servers: true
      show_removable_media: true
      show_hidden_files: false
      show_status_bar: true
      show_path_bar: true
      show_posix_path_title: true
      sort_folders_first: true
      search_current_folder: true
      snap_to_grid: true
      preferred_view: column
      empty_trash_securely: true
      expand_info_panes: true
    keyboard:
      disable_auto_capitalization: true
      disable_smart_dashes: true
      disable_period_substitution: true
      disable_smart_quotes: true
      disable_auto_correct: true
      disable_text_completion: true
      key_repeat_rate: 2
      initial_key_repeat: 35
      disable_press_and_hold: true
      enable_tab_navigation: true
    language_region:
      languages:
        - en-US
        - pt-PT
      locale: en_US@currency=EUR
      measurement_units: Centimeters
      metric_units: true
      temperature_unit: Celsius
      force_24_hour: true
      hide_language_menu: true
    mouse:
      tracking_speed: 2.5
      double_click_threshold: 0.2
      scroll_speed: 1
    trackpad:
      tap_to_click: true
      silent_clicking: true
      haptic_feedback: 0
      tracking_speed: 2.5
      disable_swipe_navigation: true
    power:
      sleep_on_power: 0
      sleep_on_battery: 10
      disable_proximity_wake: true
      disable_power_nap: true
      require_password_immediately: true
    screen:
      font_smoothing: 1
      enable_hidpi: true
      screenshot_location: ~/Pictures/Screenshots
      screenshot_format: png
      disable_screenshot_shadows: false
      enable_more_space: true
    menu_bar:
      show_full_date_time: true
      date_format: EEE MMM d  h:mm:ss a
      flash_date_separators: true
    terminal:
      secure_keyboard_entry: true
    time_machine:
      disable_new_disk_prompt: true
    hot_corners:
      top_left: 4
      top_right: 3
      bottom_left: 0
      bottom_right: 2
    xcode:
      trim_whitespace: true
      trim_whitespace_only_lines: true
      disable_case_indent: true
      indent_on_paste: true
      overscroll_amount: 0.25
      hide_authors_panel: true
      hide_minimap: true
      show_build_steps: true
      show_analyzer_results: true
      show_errors: true
      show_warnings: true
      command_click_jumps: true
      show_indexing_progress: true
      show_build_duration: true
