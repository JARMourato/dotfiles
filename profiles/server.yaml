name: server
description: "Media server — Plex, Sonarr, Radarr, qBittorrent, and more"

core: [jq, curl, wget, htop]
terminal: [oh-my-zsh, powerline, theme, fonts]
cloud: [docker, docker-compose]
ai: [claude-code, codex]
media: [iina]
homeserver:
  - hostname
  - plex
  - automounter
  - volumes
  - plex-symlink
  - decrypt-env
  - docker-start
  - backup-scripts
macos:
  - dock
  - finder
  - keyboard
  - trackpad
  - power
  - screenshots
  - menu-bar
  - hot-corners
macos_complex:
  - spotlight
  - bluetooth-audio
cleanup:
  - GarageBand.app
  - iMovie.app
  - Keynote.app
  - Numbers.app
  - Pages.app
encryption: true

config:
  git:
    user_name: "JARMourato"
    user_email: "joao.armourato@gmail.com"
  macos:
    dock:
      autohide: false
      tile_size: 40
      large_size: 64
      magnification: true
      show_process_indicators: true
      disable_recent_apps: true
      disable_rearrange_spaces: true
    finder:
      show_status_bar: true
      show_path_bar: true
      sort_folders_first: true
      preferred_view: column
      show_external_drives: true
      show_hard_drives: true
    keyboard:
      disable_auto_capitalization: true
      disable_smart_dashes: true
      disable_smart_quotes: true
      disable_auto_correct: true
      key_repeat_rate: 2
      initial_key_repeat: 35
      disable_press_and_hold: true
    trackpad:
      tap_to_click: true
    power:
      sleep_on_power: 0
      disable_power_nap: true
    screenshots:
      screenshot_location: ~/Pictures/Screenshots
      screenshot_format: png
    menu_bar:
      show_full_date_time: true
    hot_corners:
      top_left: 4
      top_right: 3
      bottom_right: 2
